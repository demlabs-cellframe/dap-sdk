variables:
    GIT_SUBMODULE_STRATEGY: recursive

stages:
    - build
    - cppchecks

.ci-polygon:
  tags:
     - ci-polygon
  
.tests:  
  extends: .ci-polygon
  stage: build
  rules:
   - if: $CI_PIPELINE_SOURCE == "merge_request_event"
     when: always
   - when: always
  timeout: 3 hours 30 minutes
  dependencies: []
  
  
tests:amd64.debian:
    extends: .tests
    image: demlabs/debian/amd64:qt6
    before_script:
      - set -eo pipefail
      - apt-get update -qq
      - apt-get install -y -qq gawk
      - /opt/buildtools/prepare_environment.sh amd64-linux 
    script:
      - set -eo pipefail
      - pwd
      - env
      - mkdir build
      - cd build
      - cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_DAP_SDK_TESTS=ON -DBUILD_WITH_ECDSA=ON -DBUILD_WITH_GDB_DRIVER_MDBX=ON
      - make -j$(nproc)
      - ctest --verbose

tests:arm32.debian:
    extends: .tests
    image: demlabs/debian/amd64:cross
    script:
      - set -eo pipefail
      - mkdir build
      - cd build
      - cmake-arm32 .. -DCMAKE_BUILD_TYPE=Release -DBUILD_DAP_SDK_TESTS=ON -DBUILD_WITH_ECDSA=ON
      - make -j$(nproc)
      - ctest --verbose

tests:arm64.debian:
    extends: .tests
    image: demlabs/debian/amd64:cross
    script:
      - set -eo pipefail
      - mkdir build
      - cd build
      - cmake-arm64 .. -DCMAKE_BUILD_TYPE=Release -DBUILD_DAP_SDK_TESTS=ON -DBUILD_WITH_ECDSA=ON
      - make -j$(nproc)
      - ctest --verbose

tests:amd64.windows:
    extends: .tests
    image: demlabs/windows/amd64:qt6
    before_script:
      - set -eo pipefail
      - /opt/buildtools/prepare_environment.sh amd64-windows
      # Wine needs a virtual framebuffer in headless Docker (nodrv_CreateWindow / explorer crash).
      - apt-get update -qq
      - DEBIAN_FRONTEND=noninteractive apt-get install -y -qq xvfb
    script:
      - set -eo pipefail
      - export DISPLAY=:99
      - Xvfb :99 -screen 0 1024x768x24 -nolisten tcp &
      - XPID=$!
      - trap 'kill ${XPID} 2>/dev/null || true' EXIT
      - sleep 3
      - export WINEDLLOVERRIDES="winemenubuilder.exe=d"
      - export WINEARCH=win64
      - export WINEDEBUG=-all
      - export WINEPREFIX="${CI_PROJECT_DIR}/.wine-ci-win64"
      - rm -rf "${WINEPREFIX}"
      - mkdir build
      - cd build
      - export PATH=${MXE_ROOT}/usr/bin:$PATH
      - x86_64-w64-mingw32.static-cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_DAP_SDK_TESTS=ON -DBUILD_WITH_ECDSA=ON -DBUILD_WITH_GDB_DRIVER_PGSQL=0 -DCMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/wine
      - make -j$(nproc)
      - ctest --verbose

tests:arm64.macos:
    extends: .tests
    tags:
      - macos-native
    script:
      - set -eo pipefail
      - mkdir build
      - cd build
      - cmake -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DBUILD_DAP_SDK_TESTS=ON -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_ECDSA=ON -DBUILD_WITH_GDB_DRIVER_PGSQL=0 ..
      - make -j$(sysctl -n hw.ncpu)
      - ctest --verbose

tests:amd64.debian.asan-ubsan:
    extends: .tests
    image: demlabs/debian/amd64:qt6
    before_script:
      - set -eo pipefail
      - apt-get update -qq
      - apt-get install -y -qq gawk
      - /opt/buildtools/prepare_environment.sh amd64-linux
    script:
      - set -eo pipefail
      - mkdir build && cd build
      - cmake .. -DCMAKE_BUILD_TYPE=Debug -DBUILD_DAP_SDK_TESTS=ON -DBUILD_WITH_ECDSA=ON
            -DDAP_SANITIZE_ADDRESS=ON -DDAP_SANITIZE_UNDEFINED=ON
      - make -j$(nproc)
      # detect_odr_violation=0: unit tests link libdap-sdk.so and also embed some of the same TU globals (e.g. dap_common.c) — ASan reports duplicate globals as ODR violation.
      - ASAN_OPTIONS=detect_leaks=1:halt_on_error=1:detect_odr_violation=0
        UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1
        ctest --verbose --label-regex "unit|crypto"

tests:amd64.debian.tsan:
    extends: .tests
    image: demlabs/debian/amd64:qt6
    before_script:
      - set -eo pipefail
      - apt-get update -qq
      - apt-get install -y -qq gawk
      - /opt/buildtools/prepare_environment.sh amd64-linux
    script:
      - set -eo pipefail
      - mkdir build && cd build
      - cmake .. -DCMAKE_BUILD_TYPE=Debug -DBUILD_DAP_SDK_TESTS=ON -DBUILD_WITH_ECDSA=ON
            -DDAP_SANITIZE_THREAD=ON
      - make -j$(nproc)
      - TSAN_OPTIONS=halt_on_error=1:second_deadlock_stack=1
        ctest --verbose --label-regex "unit|crypto"

build:any.android:
    extends: .tests
    image: demlabs/android/any:qt6
    before_script:
      - set -eo pipefail
      - /opt/buildtools/prepare_environment.sh amd64-osx
    script:
      - set -eo pipefail
      - mkdir build
      - cd build
      - cmake -DANDROID_PLATFORM=29 -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${ANDROID_CMAKE_TOOLCHAIN} ..
      - make -j$(nproc)

