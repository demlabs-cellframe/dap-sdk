# GitLab CI/CD Configuration for Python-DAP 3.0
# Modern CMake-based pipeline: cmake → cpack → ctest

variables:
  PYTHON_VERSION: "3.9"
  CMAKE_BUILD_TYPE: "Release"
  BUILD_SHARED: "ON"
  DAP_VERSION: "3.0.0"
  CTEST_TIMEOUT: "600"

stages:
  - validate
  - cmake_build
  - cpack_package
  - ctest_tests
  - deploy

.python_dap_base:
  image: demlabs/debian/amd64:qt5
  before_script:
    - apt-get update && apt-get install -y 
        python3 python3-pip python3-venv python3-dev
        cmake make build-essential pkg-config
        libssl-dev libjson-c-dev
    - python3 -m pip install --upgrade pip setuptools wheel pytest
  cache:
    key: python-dap-v3-cache
    paths:
      - build_new/
      - venv/
      - .pytest_cache/
  timeout: 15 minutes

# ===============================================
# STAGE 1: VALIDATION
# ===============================================

code_validation:
  extends: .python_dap_base
  stage: validate
  script:
    - echo "🔍 Python-DAP 3.0 Code Validation"
    - echo "✅ Checking Python files syntax..."
    - find dap/ -name "*.py" -exec python3 -m py_compile {} \;
    - echo "✅ Checking C source files..."
    - find src/ -name "*.c" -exec gcc -fsyntax-only {} \; 2>/dev/null || true
    - echo "✅ Validating CMakeLists.txt..."
    - cmake --help > /dev/null
    - echo "🎯 Version validation:"
    - grep -r "3\.0\.0" dap/__init__.py CMakeLists.txt
    - echo "✅ Code validation completed"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ===============================================
# STAGE 2: CMAKE BUILD
# ===============================================

cmake_configure_build:
  extends: .python_dap_base
  stage: cmake_build
  script:
    - echo "🏗️ Python-DAP 3.0 CMake Configuration & Build"
    - mkdir -p build_new && cd build_new
    - echo "📋 CMake Configuration:"
    - cmake .. 
        -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE}
        -DBUILD_SHARED=${BUILD_SHARED}
        -DPYTHON_EXECUTABLE=$(which python3)
    - echo "🔨 Building python_dap module..."
    - make python_dap -j$(nproc)
    - echo "📊 Build results:"
    - ls -la lib/python_dap.so
    - nm lib/python_dap.so | grep -c "T " || echo "0"
    - echo "✅ CMake build completed successfully"
  artifacts:
    paths:
      - build_new/
    expire_in: 2 hours
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ===============================================
# STAGE 3: CPACK PACKAGING  
# ===============================================

cpack_create_packages:
  extends: .python_dap_base
  stage: cpack_package
  dependencies:
    - cmake_configure_build
  script:
    - echo "📦 Python-DAP 3.0 CPack Package Creation"
    - cd build_new
    - echo "🏗️ Building Python package..."
    - make python_package
    - echo "📁 Package contents:"
    - ls -la dist/
    - find dist/ -name "*.whl" -exec ls -lh {} \;
    - echo "🔍 Package validation:"
    - file dist/*.whl
    - python3 -m zipfile -l dist/*.whl | head -20
    - echo "📊 Package statistics:"
    - find dist/ -name "*.whl" -exec wc -c {} \;
    - echo "✅ CPack packaging completed successfully"
  artifacts:
    paths:
      - build_new/dist/
      - build_new/lib/
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ===============================================
# STAGE 4: CTEST TESTING
# ===============================================

ctest_setup_environment:
  extends: .python_dap_base  
  stage: ctest_tests
  dependencies:
    - cpack_create_packages
  script:
    - echo "🧪 Python-DAP 3.0 CTest Environment Setup"
    - cd build_new
    - echo "🔧 Setting up test environment..."
    - make test_setup
    - echo "✅ Virtual environment created"
    - source ../venv/bin/activate
    - python --version
    - pip list | grep -E "(python-dap|pytest)"
    - echo "🔍 Module verification:"
    - python -c "import python_dap; print(f'Functions: {len([n for n in dir(python_dap) if not n.startswith(\"_\")])}')"
    - echo "✅ Test environment ready"
  artifacts:
    paths:
      - venv/
      - build_new/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

ctest_run_all_tests:
  extends: .python_dap_base
  stage: ctest_tests
  dependencies:
    - ctest_setup_environment
  script:
    - echo "🚀 Python-DAP 3.0 CTest Execution"
    - cd build_new
    - echo "📋 Available tests:"
    - ctest -N
    - echo "🧪 Running all tests with ctest..."
    - ctest --output-on-failure --timeout ${CTEST_TIMEOUT} -j$(nproc) --verbose
    - echo "📊 Test results summary:"
    - ctest --output-on-failure --timeout ${CTEST_TIMEOUT} -j$(nproc) | tail -20
    - echo "✅ CTest execution completed"
  artifacts:
    when: always
    paths:
      - build_new/Testing/
      - build_new/test_results.xml
    reports:
      junit: build_new/test_results.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

ctest_detailed_reports:
  extends: .python_dap_base
  stage: ctest_tests
  dependencies:
    - ctest_run_all_tests
  script:
    - echo "📊 Python-DAP 3.0 Detailed Test Reports"
    - cd build_new
    - echo "🔍 Test categories analysis:"
    - ctest -R "unit" -N | wc -l || echo "0 unit tests"
    - ctest -R "integration" -N | wc -l || echo "0 integration tests" 
    - ctest -R "regression" -N | wc -l || echo "0 regression tests"
    - echo "📈 Coverage summary:"
    - source ../venv/bin/activate
    - python -c "
import subprocess
import sys
try:
    result = subprocess.run(['ctest', '--output-on-failure'], 
                          capture_output=True, text=True)
    total_tests = result.stdout.count('Test #')
    passed_tests = result.stdout.count('Passed')
    failed_tests = result.stdout.count('Failed')
    print(f'📊 Test Summary:')
    print(f'  Total: {total_tests}')
    print(f'  Passed: {passed_tests}')
    print(f'  Failed: {failed_tests}')
    if total_tests > 0:
        success_rate = (passed_tests / total_tests) * 100
        print(f'  Success Rate: {success_rate:.1f}%')
except Exception as e:
    print(f'Error analyzing results: {e}')
"
    - echo "✅ Detailed reports completed"
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: manual

# ===============================================  
# STAGE 5: DEPLOYMENT
# ===============================================

deploy_artifacts:
  extends: .python_dap_base
  stage: deploy
  dependencies:
    - ctest_run_all_tests
  script:
    - echo "🚀 Python-DAP 3.0 Deployment Preparation"
    - cd build_new
    - echo "📦 Final package verification:"
    - ls -la dist/
    - echo "🏷️ Version confirmation:"
    - python3 -c "
import sys
sys.path.insert(0, '../')
import dap
print(f'Package version: {dap.__version__}')
assert dap.__version__ == '3.0.0', f'Expected 3.0.0, got {dap.__version__}'
print('✅ Version validation passed')
"
    - echo "📋 Deployment manifest:"
    - echo "  - Python-DAP version: 3.0.0"
    - echo "  - Binary module: python_dap.so"
    - echo "  - Wheel package: $(ls dist/*.whl)"
    - echo "  - Tests passed: $(ctest --output-on-failure 2>&1 | grep -c 'Passed' || echo '0')"
    - echo "✅ Ready for deployment"
  artifacts:
    paths:
      - build_new/dist/
      - build_new/lib/python_dap.so
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - when: never

# ===============================================
# MANUAL JOBS
# ===============================================

performance_benchmark:
  extends: .python_dap_base
  stage: ctest_tests
  dependencies:
    - ctest_setup_environment
  script:
    - echo "⚡ Python-DAP 3.0 Performance Benchmark"
    - cd build_new
    - source ../venv/bin/activate
    - python -c "
import time
import python_dap

print('🚀 Performance benchmarks:')

# Test function availability speed
start = time.time()
functions = [name for name in dir(python_dap) if not name.startswith('_')]
end = time.time()
print(f'  Function discovery: {len(functions)} functions in {(end-start)*1000:.2f}ms')

# Test basic operations
operations = ['py_exec_with_ret_multistring', 'server_new', 'dap_malloc']
for op in operations:
    if hasattr(python_dap, op):
        start = time.time()
        try:
            if op == 'py_exec_with_ret_multistring':
                result = getattr(python_dap, op)('echo test')
            elif op == 'server_new':
                result = getattr(python_dap, op)('benchmark')
            elif op == 'dap_malloc':
                result = getattr(python_dap, op)(1024)
            end = time.time()
            print(f'  {op}: {(end-start)*1000:.2f}ms')
        except Exception as e:
            print(f'  {op}: Error - {e}')
    else:
        print(f'  {op}: Not available')

print('✅ Benchmark completed')
"
    - echo "✅ Performance benchmark completed"
  when: manual

debug_environment:
  extends: .python_dap_base
  stage: ctest_tests
  dependencies:
    - ctest_setup_environment
  script:
    - echo "🔧 Python-DAP 3.0 Debug Environment"
    - cd build_new
    - echo "🔍 Environment diagnostics:"
    - python3 --version
    - cmake --version
    - make --version
    - echo "📂 Build directory structure:"
    - find . -type f -name "*.so" -exec ls -la {} \;
    - echo "🧪 Module introspection:"
    - source ../venv/bin/activate
    - python -c "
import python_dap
import inspect

print('📋 Module information:')
print(f'Module file: {python_dap.__file__ if hasattr(python_dap, \"__file__\") else \"Built-in\"}')
print(f'Module doc: {python_dap.__doc__[:100] if python_dap.__doc__ else \"No documentation\"}')

functions = [name for name in dir(python_dap) if not name.startswith('_')]
print(f'Total functions: {len(functions)}')

categories = {
    'events': [f for f in functions if 'event' in f.lower()],
    'server': [f for f in functions if 'server' in f.lower()], 
    'crypto': [f for f in functions if any(w in f.lower() for w in ['hash', 'sign', 'crypt'])],
    'system': [f for f in functions if any(w in f.lower() for w in ['exec', 'malloc', 'free'])]
}

for category, funcs in categories.items():
    print(f'{category.title()}: {len(funcs)} functions')
    for func in funcs[:3]:  # Show first 3
        print(f'  - {func}')
    if len(funcs) > 3:
        print(f'  ... and {len(funcs)-3} more')
"
    - echo "✅ Debug environment analysis completed"
  when: manual 