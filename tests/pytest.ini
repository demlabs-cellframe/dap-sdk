[pytest]
# pytest configuration for python-dap tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = 
    unit
    integration
    regression
    performance
    functional

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings

# Timeout for tests
timeout = 300

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interaction
    regression: Regression tests to prevent bugs
    performance: Performance and benchmark tests
    functional: Functional end-to-end tests
    slow: Tests that take significant time
    network: Tests that require network functionality
    requires_build: Tests that require python_dap.so to be built

# Coverage options
[coverage:run]
source = dap
omit = 
    */tests/*
    */test_*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    pass 